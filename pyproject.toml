[tool.isort]
multi_line_output = 3
line_length = 79
include_trailing_comma = true

[tool.black]
line_length = 79


[tool.pylint.messages_control]
# Use multiple processes to speed up Pylint.
jobs = 2
disable = [
    "duplicate-code",
    "no-self-use",
    "invalid-name",
    "missing-docstring",
    "too-few-public-methods",
    "no-name-in-module",
    "missing-function-docstring",
    "missing-module-docstring",
    "import-error",
    "too-many-lines",
    "too-many-branches",
    "too-many-statements",
    "too-many-locals",
    "broad-except",
    "too-many-arguments"]

[tool.pylint.main]
fail-under = 9
load-plugins = ["pylint.extensions.no_self_use", "pylint_pydantic"]
ignore-paths = ["exports/tests"]

[tool.mypy]
scripts_are_modules = true
warn_unused_ignores = true
show_error_codes = true
enable_error_code = "ignore-without-code"
strict = true
# TODO: Remove this once pytest has annotations
disallow_untyped_decorators = false

[tool.bandit]
exclude_dirs = ["esc_stock_service/tests"]
#tests = ["B201", "B301"]
#skips = ["B101", "B601"]

[tool.ruff]
# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as Black.
line-length = 88
indent-width = 4

# Assume Python 3.8
target-version = "py38"
[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    "W",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bandit
    "S",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
ignore = [
    # bandit: Use of `assert` detected
    "S101",
]

[tool.coverage.report]
fail_under = 80
omit = ["exports/tests/*"]

[tool.coverage.run]
branch = true
omit = ["exports/tests/*"]
